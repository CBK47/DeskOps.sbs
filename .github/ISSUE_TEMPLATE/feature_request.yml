name: Feature request
description: Suggest an improvement to DeskOps.
title: "feature: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What life-admin problem would this solve?
      description: Describe the job to be done, not only the proposed interface.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: This request does not include real personal, client, or credential data.
          required: true
