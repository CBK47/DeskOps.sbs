name: Bug report
description: Tell us about something that is not working as expected.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please remove personal, client, and credential data before submitting.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed behaviour and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, device, deployment, and app version or commit.
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add redacted screenshots, logs, or other useful context.
